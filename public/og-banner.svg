<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0ff4f" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#e0ff4f" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#e0ff4f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="accent-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#e0ff4f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e0ff4f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <pattern id="noise" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="200" height="200" filter="url(#noiseFilter)" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#0a0a0a"/>

  <!-- Grid -->
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.4"/>

  <!-- Glow -->
  <ellipse cx="600" cy="200" rx="500" ry="250" fill="url(#accent-glow)"/>

  <!-- Noise -->
  <rect width="1200" height="400" fill="url(#noise)"/>

  <!-- Decorative lines -->
  <line x1="80" y1="80" x2="80" y2="320" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="1120" y1="80" x2="1120" y2="320" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="80" y1="320" x2="1120" y2="320" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- Corner accents -->
  <rect x="76" y="76" width="8" height="8" fill="#e0ff4f" opacity="0.6"/>
  <rect x="1116" y="76" width="8" height="8" fill="#e0ff4f" opacity="0.6"/>
  <rect x="76" y="316" width="8" height="8" fill="#e0ff4f" opacity="0.6"/>
  <rect x="1116" y="316" width="8" height="8" fill="#e0ff4f" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="72" letter-spacing="-3" fill="#f5f5f5">
    FRONTEND
  </text>
  <text x="600" y="245" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="72" letter-spacing="-3" fill="#f5f5f5">
    LIBRARY
  </text>

  <!-- Accent underline -->
  <rect x="460" y="262" width="280" height="3" rx="1.5" fill="#e0ff4f" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="600" y="295" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="14" letter-spacing="4" fill="#666666" text-transform="uppercase">
    EFFECTS &amp; INTERACTIONS
  </text>

  <!-- Tech badges -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#666666">
    <text x="420" y="345" text-anchor="middle">VUE 3</text>
    <text x="520" y="345" text-anchor="middle">TYPESCRIPT</text>
    <text x="620" y="345" text-anchor="middle">GSAP</text>
    <text x="700" y="345" text-anchor="middle">VITE</text>
    <text x="790" y="345" text-anchor="middle">SCSS</text>
  </g>

  <!-- Dot separators between tech -->
  <g fill="#e0ff4f" opacity="0.5">
    <circle cx="470" cy="342" r="2"/>
    <circle cx="570" cy="342" r="2"/>
    <circle cx="660" cy="342" r="2"/>
    <circle cx="745" cy="342" r="2"/>
  </g>
</svg>
